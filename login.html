<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5; /* fondo claro */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .login-box img {
      width: 80px;
      margin-bottom: 15px;
    }

    h2 {
      margin-bottom: 20px;
      color: #2e7d32;
    }

    .input-group {
      margin: 15px 0;
      text-align: left;
    }

    .input-group label {
      font-size: 12px;
      color: #2e7d32;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #2e7d32;
    }

    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #2e7d32; /* verde */
      color: white; /* texto blanco */
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #256628;
    }

    .links {
      margin-top: 10px;
      font-size: 12px;
    }

    .links a {
      color: #2e7d32;
      text-decoration: none;
    }

    .register {
      margin-top: 20px;
      display: block;
      padding: 10px;
      border: 2px solid #2e7d32;
      border-radius: 20px;
      text-decoration: none;
      color: #2e7d32;
      font-weight: bold;
    }

    .register:hover {
      background: #2e7d32;
      color: white;
    }

  </style>
</head>

<body>

  <div class="login-box">

    <img src="img/user.png" alt="usuario">

    <h2>Iniciar Sesión</h2>

    <form id="form-login">
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Correo" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Contraseña" required>
      </div>

      <button class="btn">LOGIN</button>
    </form>

    <div class="links">
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>

    <a href="registro.html" class="register">Registrarse</a>

  </div>
<script>
  const form = document.getElementById("form-login");

  form.addEventListener("submit", function(e) {
    e.preventDefault(); // evita recargar

       alert("Login exitoso");

   
    window.location.href = "index.html";
  });
</script>
</body>
</html>
