<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – EduCatálogo</title>
<link rel="stylesheet" href="css/styles.css" />

<style>
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 4rem 1rem;
}

.login-box {
  width: 320px;
  text-align: center;
}

.login-box h2 {
  margin-bottom: 1.5rem;
  color: black;
}

.input-green {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  background: #2e7d32;
  color: white;
}

.input-green::placeholder {
  color: white;
}

.btn-login {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.register-text {
  margin-top: 20px;
  font-size: 14px;
}

.google-link {
  display: inline-block;
  margin-top: 10px;
  font-weight: bold;
  color: #2e7d32;
  text-decoration: none;
}
</style>

</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">LOGO</a>
  <a href="index.html">HOME</a>
  <a href="cursos.html">CURSOS</a>
  <a href="favoritos.html" class="nav-badge-wrap">
    FAVORITOS
    <span class="badge" id="badge-fav" style="display:none">0</span>
  </a>
  <a href="login.html" class="activo">USUARIO</a>
</nav>

<div class="login-container">
  <div class="login-box">

    <h2>Bienvenido</h2>

    <form id="form-login">
      <input class="input-green" type="email" placeholder="Correo" required>
      <input class="input-green" type="password" placeholder="Contraseña" required>

      <button class="btn-login" type="submit">Ingresar</button>
    </form>

    <div class="register-text">
      O regístrate con
    </div>

    <a href="registro.html" class="google-link">G</a>

  </div>
</div>

<script src="js/app.js"></script>

<script>
document.getElementById("form-login").addEventListener("submit", function(e){
    e.preventDefault();
    localStorage.setItem("logueado", "true");
    window.location.href = "index.html";
});
</script>

</body>
</html>
