<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursos – EduCatálogo</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">LOGO</a>
    <a href="index.html">HOME</a>
    <a href="cursos.html" class="activo">CURSOS</a>
    <a href="favoritos.html" class="nav-badge-wrap">
      FAVORITOS
      <span class="badge" id="badge-fav" style="display:none">0</span>
    </a>
    <a href="login.html">USUARIO</a>
  </nav>

  <main class="seccion">
    <header class="seccion-header" style="margin-bottom: 2rem;">
      <h2 class="seccion-titulo">Nuestro Catálogo</h2>
      
      <div class="contenedor-busqueda">
        <input type="text" id="input-busqueda" placeholder="¿Qué quieres aprender?" class="input-filtro">
        
        <select id="select-categoria" class="select-filtro">
          <option value="todos">Todas las categorías</option>
          <option value="Tecnología">Tecnología</option>
          <option value="Arte">Arte</option>
          <option value="Finanzas">Finanzas</option>
          <option value="Marketing">Marketing</option>
        </select>
      </div>
    </header>

    <div class="grid-cursos" id="grid-catalogo">
        <p style="grid-column: 1/-1; text-align: center; color: var(--texto-suave); padding: 4rem;">
        </p>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
