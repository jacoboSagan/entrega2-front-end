<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto – EduCatálogo</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">EduCatálogo</a>
    <a href="index.html">INICIO</a>
    <a href="cursos.html">CURSOS</a>
    <a href="favoritos.html" class="nav-badge-wrap">
      FAVORITOS
      <span class="badge" id="badge-fav" style="display:none">0</span>
    </a>
    <a href="login.html">USUARIO</a>
  </nav>

  <main class="contacto-container">
    <h1 class="contacto-titulo-grande">Contacto</h1>

    <form action="mailto:autumncheeky@gmail.com" method="POST" enctype="text/plain" class="form-contacto-estilo">
      
      <input type="text" name="Nombre" class="input-bloque-verde" placeholder="Nombre" required>
      
      <input type="email" name="Correo" class="input-bloque-verde" placeholder="Correo" required>
      
      <textarea name="Motivo" class="input-bloque-verde" placeholder="Motivo" required style="resize: none; min-height: 200px;"></textarea>

      <button type="submit" class="input-bloque-verde btn-submit-contacto">
        ENVIAR MENSAJE
      </button>

    </form>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
